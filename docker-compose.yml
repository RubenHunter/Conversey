version: '3.8'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  backend:
    image: europe-west1-docker.pkg.dev/ip1-mvp-project/conversey-repo/backend:latest
    expose:
      - "8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - AI__Provider=Mistral
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - ConnectionStrings__Default=${DB_CONN}
    depends_on:
      - db-proxy

  db-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "ip1-mvp-project:europe-west1:conversey-db-prod"
