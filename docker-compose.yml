services:
  frontend:
    # Verwijst naar je gepushte image
    image: europe-west1-docker.pkg.dev/ip1-mvp-project/conversey-repo/frontend:latest
    ports:
      - "80:5173"
    environment:
      - CI=true
      - VITE_API_BASE_URL=http://34.111.97.70/api
    restart: always

  backend:
    # Verwijst naar je gepushte image
    image: europe-west1-docker.pkg.dev/ip1-mvp-project/conversey-repo/backend:latest
    ports:
      - "5231:5000"
    depends_on:
      - db-proxy
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Repository__Type=Postgres
      - ASPNETCORE_URLS=http://+:5000
    restart: always

  db-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${SQL_CONN_NAME}"
    restart: always