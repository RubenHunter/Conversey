version: '3.8'

services:
  frontend:
    image: europe-west1-docker.pkg.dev/ip1-mvp-project/conversey-repo/frontend:latest
    container_name: app_frontend_1
    ports:
      - "0.0.0.0:80:80"
    restart: always

  backend:
    image: europe-west1-docker.pkg.dev/ip1-mvp-project/conversey-repo/backend:latest
    container_name: app_backend_1
    ports:
      - "0.0.0.0:5231:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - db-proxy
    restart: always

  db-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
    container_name: app_db-proxy_1
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "ip1-mvp-project:europe-west1:conversey-db-prod" # Moet matchen met deploy.sh!
    restart: always

networks:
  default:
    name: app_default