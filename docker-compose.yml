services:
  frontend:
    build:
      context: ./frontend/Conversey/
      dockerfile: Dockerfile
    ports:
      - "80:5173"
    environment:
      - CI=true
      - VITE_API_BASE_URL=http://34.111.97.70/api
    restart: always

  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    ports:
      - "5231:5000"
    # GEEN volumes hier, we vertrouwen op de Docker build
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Repository__Type=Postgres
      - ASPNETCORE_URLS=http://+:5000
    restart: always
