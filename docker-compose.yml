services:
    frontend:
      build: 
          context: ./frontend/Conversey/
          dockerfile: Dockerfile
      ports:
          - "5173:5173"
      volumes:
          - ./frontend/Conversey:/app
          - /app/node_modules
      environment:
          - CHOKIDAR_USEPOLLING=true #enables hot reloading
          - CI=true
      command: pnpm run dev --host

    backend:
      build:
          context: ./backend/
          dockerfile: Dockerfile
      ports:
          - "5000:5000"
      volumes:
          - ./backend:/src
          - ./backend/nuget-cache:/root/.nuget/packages #Caching nuget packages
      environment:
          - DOTNET_USE_POLLING_FILE_WATCHER=1 #Enables hot reloading
      depends_on:
          - postgres


      #PostgreSQL for development
    postgres:
      image: postgres:15
      restart: always
      environment:
          POSTGRES_USER: devuser
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: devdb
      ports: 
          - "5432:5432"
      volumes:
          - postgres-data:/var/lib/postgresql/data


volumes:
  postgres-data:

