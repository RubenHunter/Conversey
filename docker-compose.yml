services:
    frontend:
      build: 
          context: ./frontend/Conversey/
          dockerfile: Dockerfile
      ports:
          - "5173:5173"
      volumes:
          - ./frontend/Conversey:/app
          - /app/node_modules
      environment:
          - CHOKIDAR_USEPOLLING=true #enables hot reloading
          - CI=true
          - BACKEND_URL=http://backend:5000
      command: pnpm run dev --host

    backend:
      build:
          context: ./backend/
          dockerfile: Dockerfile
      ports:
          - "5231:5231"
      volumes:
          - ./backend:/src
          - ./backend/nuget-cache:/root/.nuget/packages #Caching nuget packages
      environment:
          - DOTNET_USE_POLLING_FILE_WATCHER=1 #Enables hot reloading
          - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=devdb;Username=devuser;Password=devpass
          - Repository__Type=Postgres
      depends_on:
        postgres:
          condition: service_healthy


      #PostgreSQL for development
    postgres:
      image: postgres:15
      restart: always
      environment:
          POSTGRES_USER: devuser
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: devdb
      ports: 
          - "5432:5432"
      volumes:
          - postgres-data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
        interval: 5s
        timeout: 3s
        retries: 10
          


volumes:
  postgres-data:

