stages:
  - validate
  - build
  - security
  - sign
  - deploy

# 1. Validatie op Merge Requests
validate-code:
  stage: validate
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - echo "🔍 Code controleren..."
    - cd backend
    - dotnet restore
    - dotnet build --no-restore
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# 2. Build & Push naar Productie
build-backend:
  stage: build
  image: google/cloud-sdk:latest
  id_tokens:
    WORKLOAD_IDENTITY_TOKEN:
      aud: https://gitlab.com
  before_script:
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - echo ${WORKLOAD_IDENTITY_TOKEN} > .gitlab-oidc-token
    - gcloud iam workload-identity-pools create-cred-config ${WIF_PROVIDER} --service-account=${GCP_SERVICE_ACCOUNT} --output-file=.gcp-credentials.json --credential-source-file=.gitlab-oidc-token
    - gcloud auth login --cred-file=.gcp-credentials.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - echo "🚀 Start Cloud Build voor de backend..."
    - gcloud builds submit backend/ --tag europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest --region=europe-west1 --quiet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 3. Security Scanning (DevSecOps) - Trivy v0.70.0 via .deb package
security-scan:
  stage: security
  image: google/cloud-sdk:latest
  id_tokens:
    WORKLOAD_IDENTITY_TOKEN:
      aud: https://gitlab.com
  before_script:
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - echo ${WORKLOAD_IDENTITY_TOKEN} > .gitlab-oidc-token
    - gcloud iam workload-identity-pools create-cred-config ${WIF_PROVIDER} --service-account=${GCP_SERVICE_ACCOUNT} --output-file=.gcp-credentials.json --credential-source-file=.gitlab-oidc-token
    - gcloud auth login --cred-file=.gcp-credentials.json
    - curl -L -o trivy.deb https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
    - dpkg -i trivy.deb
  script:
    - echo "🛡️ Scanning image for vulnerabilities..."
    - export TRIVY_PASSWORD=$(gcloud auth print-access-token)
    - export TRIVY_USERNAME=oauth2accesstoken
    - trivy image --severity HIGH,CRITICAL europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 4. SBOM Generation - Syft v1.0.0
generate-sbom:
  stage: security
  image: google/cloud-sdk:latest
  id_tokens:
    WORKLOAD_IDENTITY_TOKEN:
      aud: https://gitlab.com
  before_script:
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - echo ${WORKLOAD_IDENTITY_TOKEN} > .gitlab-oidc-token
    - gcloud iam workload-identity-pools create-cred-config ${WIF_PROVIDER} --service-account=${GCP_SERVICE_ACCOUNT} --output-file=.gcp-credentials.json --credential-source-file=.gitlab-oidc-token
    - gcloud auth login --cred-file=.gcp-credentials.json
    - apt-get update && apt-get install -y curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
  script:
    - echo "📦 Generating SBOM (Software Bill of Materials)..."
    - export SYFT_REGISTRY_AUTH_TOKEN=$(gcloud auth print-access-token)
    - syft europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest -o cyclonedx-json > sbom.json
  artifacts:
    paths:
      - sbom.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 5. Image Signing - Cosign
sign-image:
  stage: sign
  image: google/cloud-sdk:latest
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -L https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign
  script:
    - echo "🖋️ Cosign verification ready."
    - cosign version
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 6. Herstart Servers
deploy-to-cloud:
  stage: deploy
  image: google/cloud-sdk:latest
  id_tokens:
    WORKLOAD_IDENTITY_TOKEN:
      aud: https://gitlab.com
  before_script:
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - echo ${WORKLOAD_IDENTITY_TOKEN} > .gitlab-oidc-token
    - gcloud iam workload-identity-pools create-cred-config ${WIF_PROVIDER} --service-account=${GCP_SERVICE_ACCOUNT} --output-file=.gcp-credentials.json --credential-source-file=.gitlab-oidc-token
    - gcloud auth login --cred-file=.gcp-credentials.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - echo "🔄 Nieuw instance template aanmaken en rolling update starten..."
    - REGION="europe-west1"
    - ZONE="europe-west1-b"
    - IMAGE_URL="${REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/conversey-repo/backend:latest"
    - TEMPLATE_NAME="conversey-template-$(date +%s)"
    - FULL_CONN=$(gcloud secrets versions access latest --secret="ConnectionStrings__DefaultConnection" --quiet 2>/dev/null || echo "")
    - MISTRAL_KEY=$(gcloud secrets versions access latest --secret="MISTRAL_API_KEY" --quiet 2>/dev/null || echo "")
    - BUCKET_NAME="${GCP_PROJECT_ID}-media"
    - gcloud compute instance-templates create-with-container $TEMPLATE_NAME --container-image=$IMAGE_URL --container-env="ConnectionStrings__Default=${FULL_CONN},AI__Mistral__ApiKey=${MISTRAL_KEY},AI__Provider=Mistral,GoogleCloud__StorageBucket=${BUCKET_NAME},ASPNETCORE_URLS=http://+:8080,COMPlus_EnableHWIntrinsic=0" --tags=http-server --machine-type=e2-medium --project=$GCP_PROJECT_ID --quiet
    - gcloud compute instance-groups managed rolling-action start-update conversey-mig --version=template=$TEMPLATE_NAME --zone=$ZONE --project=$GCP_PROJECT_ID --quiet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"