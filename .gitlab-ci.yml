stages:
  - validate
  - build
  - security
  - sign
  - deploy

# 1. Validatie op Merge Requests
validate-code:
  stage: validate
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - echo "🔍 Code controleren..."
    - cd backend
    - dotnet restore
    - dotnet build --no-restore
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# 2. Build & Push naar Productie
build-backend:
  stage: build
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SERVICE_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - echo "🚀 Start Cloud Build voor de backend..."
    - gcloud builds submit backend/ --tag europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest --quiet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 3. Security Scanning & SBOM (DevSecOps)
security-scan:
  stage: security
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SERVICE_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - apt-get update && apt-get install -y curl tar
    # Trivy download met exact gecontroleerde URL (lowercase 'linux')
    - curl -L https://github.com/aquasecurity/trivy/releases/download/v0.49.1/trivy_0.49.1_linux-64bit.tar.gz | tar xzf - -C /usr/local/bin trivy
  script:
    - echo "🛡️ Scanning image for vulnerabilities..."
    - export TRIVY_PASSWORD=$(gcloud auth print-access-token)
    - export TRIVY_USERNAME=oauth2accesstoken
    - trivy image --severity HIGH,CRITICAL europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

generate-sbom:
  stage: security
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SERVICE_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - apt-get update && apt-get install -y curl tar
    - curl -L https://github.com/anchore/syft/releases/download/v1.0.0/syft_1.0.0_linux_amd64.tar.gz | tar xzf - -C /usr/local/bin syft
  script:
    - echo "📦 Generating SBOM (Software Bill of Materials)..."
    - export SYFT_REGISTRY_AUTH_TOKEN=$(gcloud auth print-access-token)
    - syft europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest -o cyclonedx-json > sbom.json
  artifacts:
    paths:
      - sbom.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

sign-image:
  stage: sign
  image: google/cloud-sdk:latest
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -L https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign
  script:
    - echo "🖋️ Cosign verification ready."
    - cosign version
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 5. Herstart Servers
deploy-to-cloud:
  stage: deploy
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SERVICE_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - echo "🔄 Rolling update van de Managed Instance Group..."
    - gcloud compute instance-groups managed rolling-action restart conversey-mig --zone=europe-west1-b --project=$GCP_PROJECT_ID --quiet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"