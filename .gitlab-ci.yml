include:
  - template: Security/Container-Scanning.gitlab-ci.yml

stages:
  - validate
  - build
  - test
  - security
  - sign
  - deploy

# 1. Validatie op Merge Requests
validate-code:
  stage: validate
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - echo "🔍 Code controleren..."
    - cd backend
    - dotnet restore
    - dotnet build --no-restore
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# 2. Build & Push naar Productie
build-backend:
  stage: build
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SERVICE_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - echo "🚀 Start Cloud Build voor de backend..."
    - gcloud builds submit backend/ --tag europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest --quiet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 3. Native GitLab Container Scanning (Trivy)
container_scanning:
  stage: test
  variables:
    CS_IMAGE: europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest
    CS_REGISTRY_USER: "oauth2accesstoken"
    CS_REGISTRY_PASSWORD: "$GCP_SERVICE_KEY"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 4. SBOM & Signing (DevSecOps)
generate-sbom:
  stage: security
  image: google/cloud-sdk:latest
  before_script:
    - apt-get update && apt-get install -y curl tar
    - echo "📥 Download Syft..."
    - curl -sSfL https://github.com/anchore/syft/releases/download/v1.0.0/syft_1.0.0_linux_amd64.tar.gz -o syft.tar.gz
    - tar xzf syft.tar.gz -C /usr/local/bin syft
  script:
    - echo "📦 Generating SBOM (Software Bill of Materials)..."
    - gcloud auth activate-service-account --key-file=<(echo "$GCP_SERVICE_KEY")
    - export SYFT_REGISTRY_AUTH_TOKEN=$(gcloud auth print-access-token)
    - /usr/local/bin/syft europe-west1-docker.pkg.dev/$GCP_PROJECT_ID/conversey-repo/backend:latest -o cyclonedx-json > sbom.json
  artifacts:
    paths:
      - sbom.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

sign-image:
  stage: sign
  image: google/cloud-sdk:latest
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -L https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign
  script:
    - echo "🖋️ Cosign verification ready."
    - /usr/local/bin/cosign version
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 5. Herstart Servers
deploy-to-cloud:
  stage: deploy
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SERVICE_KEY" > gcp-key.json
    - gcloud auth activate-service-account --key-file=gcp-key.json
    - export GCP_PROJECT_ID=$(echo $GCP_PROJECT_ID | tr -d '\r\n')
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - echo "🔄 Rolling update van de Managed Instance Group..."
    - gcloud compute instance-groups managed rolling-action restart conversey-mig --zone=europe-west1-b --project=$GCP_PROJECT_ID --quiet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"